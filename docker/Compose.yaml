services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: ${PORT:-8080}
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/hackonlinces}
      DB_USERNAME: ${DB_USERNAME:-hackonlinces_user}
      DB_PASSWORD: ${DB_PASSWORD:-hackonlinces_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion-minimo-256-bits}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      INTERNAL_EMAIL_DOMAIN: ${INTERNAL_EMAIL_DOMAIN:-itcelaya.edu.mx}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10MB}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-30MB}
      UPLOAD_DIR: /app/uploads
      SUBMISSION_MAX_ATTEMPTS: ${SUBMISSION_MAX_ATTEMPTS:-5}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/api/v1/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 60s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hackonlinces}
      POSTGRES_USER: ${POSTGRES_USER:-hackonlinces_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hackonlinces_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackonlinces_user} -d ${POSTGRES_DB:-hackonlinces}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data: